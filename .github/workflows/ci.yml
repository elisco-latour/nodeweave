name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Unit tests (@nodeweave/core)
        run: pnpm test
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser tests (component + e2e)
        run: pnpm exec playwright test --project=component --project=e2e

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build docs site
        run: pnpm --filter @nodeweave/website build
