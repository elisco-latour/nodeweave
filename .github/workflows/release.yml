name: Release

# Changesets-driven release for @build744/nodeweave-*.
#
# On push to main:
#   - if there are pending changesets → open/update a "Version Packages" PR
#     (bumps versions + writes CHANGELOGs).
#   - once that PR is merged (no pending changesets) → publish the changed
#     packages to npm.
#
# The publish is gated on the dry-run (pnpm verify:packages) passing first.
# Auth is tokenless — npm Trusted Publishing (OIDC) via the workflow's id-token;
# no NPM_TOKEN secret. Each package must have a trusted publisher configured on
# npmjs.com (owner elisco-latour, repo nodeweave, workflow release.yml).
# Provenance is signed with the same OIDC token.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write # version-PR commits, tags, GitHub releases
  pull-requests: write # open the Version Packages PR
  id-token: write # npm provenance

# Run JavaScript actions on Node 24 (they still default to Node 20 until GitHub flips it).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # npm Trusted Publishing (OIDC) needs a recent npm (>= 11.5.1). No
      # registry-url/always-auth: those only wire up a token-based .npmrc, which
      # the tokenless OIDC flow replaces.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install --global npm@latest

      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Unit tests
        run: pnpm test

      # Dry-run gate — must pass before anything is published.
      - name: Verify publishable packages (dry-run)
        run: pnpm verify:packages

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
