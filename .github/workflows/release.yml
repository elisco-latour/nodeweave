name: Release

# Changesets-driven release for @nodeweave/*.
#
# On push to main:
#   - if there are pending changesets → open/update a "Version Packages" PR
#     (bumps versions + writes CHANGELOGs).
#   - once that PR is merged (no pending changesets) → publish the changed
#     packages to npm.
#
# The publish is gated on the dry-run (pnpm verify:packages) passing first.
# Requires an NPM_TOKEN secret (automation token with publish rights to the
# @nodeweave scope). Provenance uses the workflow's OIDC token.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write # version-PR commits, tags, GitHub releases
  pull-requests: write # open the Version Packages PR
  id-token: write # npm provenance

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Unit tests
        run: pnpm test

      # Dry-run gate — must pass before anything is published.
      - name: Verify publishable packages (dry-run)
        run: pnpm verify:packages

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
